<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">

<title>🌱 1학년 7반 성장 선언</title>

<style>
* { box-sizing: border-box; }

body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, sans-serif;
    background: linear-gradient(135deg, #c3f0ca, #f9f7d9);
    padding: 15px;
}

.container {
    max-width: 600px;
    margin: auto;
}

h2 { text-align: center; }

label { font-weight: bold; font-size: 14px; }

input {
    width: 100%;
    padding: 14px;
    margin: 8px 0 12px 0;
    border-radius: 12px;
    border: 1px solid #ccc;
    font-size: 16px;
}

.buttonBox {
    background: white;
    padding: 12px;
    border-radius: 15px;
    margin-bottom: 15px;
    max-height: 200px;
    overflow-y: auto;
}

.exampleBtn {
    padding: 10px 14px;
    border-radius: 20px;
    border: none;
    margin: 5px;
    background-color: #40916c;
    color: white;
    font-size: 13px;
    cursor: pointer;
}

.mainBtn {
    width: 100%;
    padding: 14px;
    border-radius: 25px;
    border: none;
    margin-top: 10px;
    background-color: #2d6a4f;
    color: white;
    font-size: 16px;
    cursor: pointer;
}

.resultBox {
    margin-top: 20px;
    padding: 15px;
    background: white;
    border-radius: 15px;
    white-space: pre-wrap;
    font-size: 14px;
}
</style>
</head>

<div class="container">

<h2>🌱 나는 이런 사람이 될래요 🌱</h2>

<label>👤 이름</label>
<input type="text" id="name">

<label>🎯 나는 이런 사람이 될래요</label>
<input type="text" id="bigHabit">
<div class="buttonBox" id="bigButtons"></div>

<label>✨ 작은 습관</label>
<input type="text" id="smallHabit">
<div class="buttonBox" id="smallButtons"></div>

<button class="mainBtn" onclick="generate()">📜 선언서 만들기</button>
<button class="mainBtn" onclick="copyText()">📋 복사하기</button>

function createButtons(list, containerId, inputId) {
    const container = document.getElementById(containerId);
    list.forEach(item => {
        const btn = document.createElement("button");
        btn.className = "exampleBtn";
        btn.innerText = item;
        btn.onclick = () => addText(inputId, item);
        container.appendChild(btn);
    });
}

function addText(inputId, text) {
    const input = document.getElementById(inputId);
    if (!input.value.includes(text)) {
        if (input.value === "") input.value = text;
        else input.value += ", " + text;
    }
}

createButtons(bigHabits, "bigButtons", "bigHabit");
createButtons(smallHabits, "smallButtons", "smallHabit");

let finalText = "";

function generate() {
    const name = document.getElementById("name").value;
    const big = document.getElementById("bigHabit").value;
    const small = document.getElementById("smallHabit").value;

    finalText =
`[1학년 7반 성장 선언]

이름: ${name}

나는 이런 사람이 될래요:
${big}

그런 사람이 되기 위한 작은 습관:
${small}

오늘의 작은 실천이 나를 바꾼다.`;

    document.getElementById("result").innerHTML =
        `<div class="resultBox">${finalText}</div>`;
}

function copyText() {
    navigator.clipboard.writeText(finalText);
    alert("복사 완료 😊");
}
</script>
