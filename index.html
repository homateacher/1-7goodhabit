    border-radius: 20px;
    border: none;
    margin-top: 10px;
    background-color: #2d6a4f;
    color: white;

}
.resultBox {
    margin-top: 20px;
    padding: 15px;
    background: white;

}

function createButtons(list, containerId, inputId) {
    const container = document.getElementById(containerId);
    list.forEach(item => {
        const btn = document.createElement("button");
        btn.className = "exampleBtn";
        btn.innerText = item;
        btn.onclick = () => addText(inputId, item);
        container.appendChild(btn);
    });
}

function addText(inputId, text) {
    const input = document.getElementById(inputId);
    if (!input.value.includes(text)) {
        if (input.value === "") input.value = text;
        else input.value += ", " + text;
    }
}

createButtons(bigHabits, "bigButtons", "bigHabit");
createButtons(smallHabits, "smallButtons", "smallHabit");

let finalText = "";

function generate() {
    const name = document.getElementById("name").value;
    const big = document.getElementById("bigHabit").value;
    const small = document.getElementById("smallHabit").value;

    finalText =
`[1학년 7반 성장 선언]

나는 이런 사람이 될래요:
${big}

그런 사람이 되기 위한 작은 습관:
${small}

오늘의 작은 실천이 나를 바꾼다.
`;

    document.getElementById("result").innerHTML =
        `<div class="resultBox"><pre>${finalText}</pre></div>`;
}

function copyText() {
    navigator.clipboard.writeText(finalText);
    alert("복사 완료! 담임샘께 제출하세요 😊");
}
